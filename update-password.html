<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置新密码 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="js/config.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">📝 My Blog</div>
    <h2 class="auth-title">设置新密码</h2>
    <p class="auth-subtitle">请输入你的新密码</p>

    <div id="alert-error" class="alert alert-error"></div>
    <div id="alert-success" class="alert alert-success"></div>

    <form id="update-password-form">
      <div class="form-group">
        <label class="form-label" for="password">新密码</label>
        <input class="form-input" type="password" id="password" placeholder="至少 6 位字符" required minlength="6" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">确认新密码</label>
        <input class="form-input" type="password" id="confirm-password" placeholder="再次输入新密码" required minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="btn-submit">
        <span id="btn-text">更新密码</span>
        <span class="spinner hidden" id="btn-spinner"></span>
      </button>
    </form>

    <p class="text-center mt-2">
      <a href="login.html" style="color: var(--gray-400); font-size: 0.85rem;">← 返回登录</a>
    </p>
  </div>

  <script type="module">
    import { updatePassword, showAlert } from './js/app.js';
    const form = document.getElementById('update-password-form');

    // 检查是否从重置密码邮件链接进入（URL 中有 type=recovery）
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    if (!hashParams.get('type') && !hashParams.get('access_token')) {
      document.getElementById('alert-error').textContent = '无效的重置链接，请重新请求找回密码';
      document.getElementById('alert-error').style.display = 'block';
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password !== confirmPassword) {
        showAlert('alert-error', '两次输入的密码不一致');
        return;
      }

      if (password.length < 6) {
        showAlert('alert-error', '密码至少需要 6 位字符');
        return;
      }

      document.getElementById('btn-text').classList.add('hidden');
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('btn-submit').disabled = true;

      const { error } = await updatePassword(password);

      if (error) {
        showAlert('alert-error', error.message || '更新密码失败，链接可能已过期');
      } else {
        showAlert('alert-success', '密码更新成功！正在跳转到登录页...');
        setTimeout(() => { window.location.href = 'login.html'; }, 1500);
      }

      document.getElementById('btn-text').classList.remove('hidden');
      document.getElementById('btn-spinner').classList.add('hidden');
      document.getElementById('btn-submit').disabled = false;
    });
  </script>
</body>
</html>
