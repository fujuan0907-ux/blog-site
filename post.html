<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">📝 My Blog</a>
    <ul class="navbar-nav" id="nav-auth"></ul>
  </nav>

  <main class="container">
    <div id="post-container">
      <div class="loading"><div class="spinner"></div> 加载中...</div>
    </div>
  </main>

  <script src="js/app.js"></script>
  <script>
    let currentPost = null;
    let currentUserId = null;

    async function loadPost() {
      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get('id');

      if (!postId) {
        document.getElementById('post-container').innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <h3>文章不存在</h3>
            <a href="index.html" class="btn btn-outline mt-2">返回首页</a>
          </div>`;
        return;
      }

      const { data: post, error } = await getPostById(postId);

      if (error || !post) {
        document.getElementById('post-container').innerHTML = `
          <div class="empty-state">
            <div class="icon">🔍</div>
            <h3>文章不存在或已被删除</h3>
            <a href="index.html" class="btn btn-outline mt-2">返回首页</a>
          </div>`;
        return;
      }

      currentPost = post;
      const { user } = await getCurrentUser();
      currentUserId = user?.id;

      document.title = `${post.title} - My Blog`;

      const isOwner = user && user.id === post.user_id;
      const mediaHtml = renderMedia(post.media_urls);

      document.getElementById('post-container').innerHTML = `
        <article class="card post-detail">
          <header class="post-detail-header">
            <h1 class="post-detail-title">${escapeHtml(post.title)}</h1>
            <div class="post-detail-meta">
              <span>👤 ${escapeHtml(post.profiles?.username || '匿名')}</span>
              <span>🕐 ${formatDate(post.created_at)}</span>
              ${post.created_at !== post.updated_at ? `<span>✏️ 更新于 ${formatDate(post.updated_at)}</span>` : ''}
            </div>
            ${isOwner ? `
              <div class="post-detail-actions">
                <a href="new-post.html?edit=${post.id}" class="btn btn-outline btn-sm">✏️ 编辑</a>
                <button class="btn btn-danger btn-sm" id="btn-delete">🗑️ 删除</button>
              </div>` : ''}
          </header>

          <div class="post-detail-content">
            ${mediaHtml ? `<div style="margin-bottom:1.5rem;">${mediaHtml}</div>` : ''}
            ${escapeHtml(post.content)}
          </div>
        </article>

        <div style="margin-top:1rem;">
          <a href="index.html" class="btn btn-outline">← 返回文章列表</a>
        </div>
      `;

      // 删除按钮
      document.getElementById('btn-delete')?.addEventListener('click', async () => {
        if (!confirm('确定要删除这篇文章吗？此操作不可撤销。')) return;
        const { error } = await deletePost(post.id);
        if (error) {
          alert('删除失败: ' + error.message);
        } else {
          window.location.href = 'index.html';
        }
      });
    }

    updateNavbar();
    loadPost();
  </script>
</body>
</html>
