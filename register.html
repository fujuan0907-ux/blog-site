<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">📝 My Blog</div>
    <h2 class="auth-title">创建账号</h2>
    <p class="auth-subtitle">注册后即可发布文章</p>

    <div id="alert-error" class="alert alert-error" style="display:none;"></div>
    <div id="alert-success" class="alert alert-success" style="display:none;"></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input class="form-input" type="text" id="username" placeholder="你的昵称" required minlength="2" maxlength="30" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">邮箱地址</label>
        <input class="form-input" type="email" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input class="form-input" type="password" id="password" placeholder="至少 6 位字符" required minlength="6" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">确认密码</label>
        <input class="form-input" type="password" id="confirm-password" placeholder="再次输入密码" required minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="btn-submit">
        <span id="btn-text">注册</span>
        <span class="spinner hidden" id="btn-spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      已有账号？<a href="login.html">立即登录</a>
    </div>

    <p class="text-center mt-2">
      <a href="index.html" style="color: var(--gray-400); font-size: 0.85rem;">← 返回首页</a>
    </p>
  </div>

  <script>
    // ====== 直接内联，不依赖任何外部文件 ======
    const SUPABASE_URL = 'https://kieznunxgzsaxxokvspx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpZXpudW54Z3pzYXh4b2t2c3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjI2NDIsImV4cCI6MjA5NTc5ODY0Mn0.9peQ-Xc6FgNYTrz9IxM9322uWfG_6tCsxd-AyP4JSkU';

    function showMsg(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 6000);
    }

    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var username = document.getElementById('username').value.trim();
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) { showMsg('alert-error', '两次密码不一致'); return; }
      if (password.length < 6) { showMsg('alert-error', '密码至少 6 位字符'); return; }

      // 显示加载
      document.getElementById('btn-text').classList.add('hidden');
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('btn-submit').disabled = true;

      try {
        var res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: email, password: password, data: { username: username } })
        });

        var data = await res.json();

        // 恢复按钮
        document.getElementById('btn-text').classList.remove('hidden');
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('btn-submit').disabled = false;

        if (res.ok && (data.user || data.id)) {
          showMsg('alert-success', '✅ 注册成功！正在跳转到登录页...');
          setTimeout(function() { window.location.href = 'login.html'; }, 1500);
        } else {
          var errMsg = data.msg || data.message || data.error || '注册失败';
          showMsg('alert-error', '❌ ' + errMsg);
        }
      } catch(err) {
        document.getElementById('btn-text').classList.remove('hidden');
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('btn-submit').disabled = false;
        showMsg('alert-error', '❌ 网络错误: ' + err.message);
      }
    });
  </script>
</body>
</html>
