<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">📝 My Blog</div>
    <h2 class="auth-title">创建账号</h2>
    <p class="auth-subtitle">注册后即可发布文章</p>

    <div id="alert-error" class="alert alert-error"></div>
    <div id="alert-success" class="alert alert-success"></div>

    <form id="register-form">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input class="form-input" type="text" id="username" placeholder="你的昵称" required minlength="2" maxlength="30" autocomplete="username">
      </div>

      <div class="form-group">
        <label class="form-label" for="email">邮箱地址</label>
        <input class="form-input" type="email" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input class="form-input" type="password" id="password" placeholder="至少 6 位字符" required minlength="6" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">确认密码</label>
        <input class="form-input" type="password" id="confirm-password" placeholder="再次输入密码" required minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="btn-submit">
        <span id="btn-text">注册</span>
        <span class="spinner hidden" id="btn-spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      已有账号？<a href="login.html">立即登录</a>
    </div>

    <p class="text-center mt-2">
      <a href="index.html" style="color: var(--gray-400); font-size: 0.85rem;">← 返回首页</a>
    </p>
  </div>

  <script src="js/app.js"></script>
  <script>
    const form = document.getElementById('register-form');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (password !== confirmPassword) {
        showAlert('alert-error', '两次输入的密码不一致');
        return;
      }

      if (password.length < 6) {
        showAlert('alert-error', '密码至少需要 6 位字符');
        return;
      }

      document.getElementById('btn-text').classList.add('hidden');
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('btn-submit').disabled = true;

      const { data, error } = await signUp(email, password, username);

      if (error) {
        showAlert('alert-error', error.message || '注册失败，请重试');
      } else if (data?.user?.identities?.length === 0) {
        showAlert('alert-error', '该邮箱已被注册，请直接登录');
      } else {
        showAlert('alert-success', '注册成功！请查看邮箱确认链接（如已开启邮箱验证），然后登录。');
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      }

      document.getElementById('btn-text').classList.remove('hidden');
      document.getElementById('btn-spinner').classList.add('hidden');
      document.getElementById('btn-submit').disabled = false;
    });
  </script>
</body>
</html>
