<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>修改密码 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">📝 My Blog</div>
    <h2 class="auth-title">修改密码</h2>
    <p class="auth-subtitle">输入当前密码和新密码</p>

    <div id="alert-error" class="alert alert-error" style="display:none;"></div>
    <div id="alert-success" class="alert alert-success" style="display:none;"></div>

    <form id="change-pwd-form">
      <div class="form-group">
        <label class="form-label" for="current-password">当前密码</label>
        <input class="form-input" type="password" id="current-password" placeholder="输入当前密码" required autocomplete="current-password">
      </div>

      <div class="form-group">
        <label class="form-label" for="new-password">新密码</label>
        <input class="form-input" type="password" id="new-password" placeholder="至少 6 位字符" required minlength="6" autocomplete="new-password">
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">确认新密码</label>
        <input class="form-input" type="password" id="confirm-password" placeholder="再次输入新密码" required minlength="6" autocomplete="new-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="btn-submit">
        <span id="btn-text">更新密码</span>
        <span class="spinner hidden" id="btn-spinner"></span>
      </button>
    </form>

    <p class="text-center mt-2">
      <a href="profile.html" style="color: var(--gray-400); font-size: 0.85rem;">← 返回个人信息</a>
    </p>
  </div>

  <script>
    var SUPABASE_URL = 'https://kieznunxgzsaxxokvspx.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpZXpudW54Z3pzYXh4b2t2c3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjI2NDIsImV4cCI6MjA5NTc5ODY0Mn0.9peQ-Xc6FgNYTrz9IxM9322uWfG_6tCsxd-AyP4JSkU';

    function getToken() { try { return JSON.parse(localStorage.getItem('sb-token'))?.access_token || null; } catch(e) { return null; } }

    function showMsg(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 5000);
    }

    // 未登录则跳转
    if (!getToken()) { window.location.href = 'login.html'; }

    document.getElementById('change-pwd-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var currentPwd = document.getElementById('current-password').value;
      var newPwd = document.getElementById('new-password').value;
      var confirmPwd = document.getElementById('confirm-password').value;

      if (newPwd !== confirmPwd) { showMsg('alert-error', '两次输入的新密码不一致'); return; }
      if (newPwd.length < 6) { showMsg('alert-error', '新密码至少需要 6 位字符'); return; }

      document.getElementById('btn-text').classList.add('hidden');
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('btn-submit').disabled = true;

      try {
        var token = getToken();
        var email = JSON.parse(localStorage.getItem('sb-token'))?.user?.email || '';

        // Supabase 不支持直接改密码，需要通过 token 验证当前密码
        // 先尝试用当前密码重新登录验证
        var verifyRes = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, password: currentPwd })
        });

        if (!verifyRes.ok) {
          document.getElementById('btn-text').classList.remove('hidden');
          document.getElementById('btn-spinner').classList.add('hidden');
          document.getElementById('btn-submit').disabled = false;
          showMsg('alert-error', '❌ 当前密码错误');
          return;
        }

        // 更新密码
        var updateRes = await fetch(SUPABASE_URL + '/auth/v1/user', {
          method: 'PUT',
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ password: newPwd })
        });

        document.getElementById('btn-text').classList.remove('hidden');
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('btn-submit').disabled = false;

        if (updateRes.ok) {
          showMsg('alert-success', '✅ 密码修改成功！');
          setTimeout(function() { window.location.href = 'profile.html'; }, 1500);
        } else {
          var data = await updateRes.json();
          showMsg('alert-error', '❌ 修改失败: ' + (data.msg || '请重试'));
        }
      } catch(err) {
        document.getElementById('btn-text').classList.remove('hidden');
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('btn-submit').disabled = false;
        showMsg('alert-error', '❌ 网络错误: ' + err.message);
      }
    });
  </script>
</body>
</html>
