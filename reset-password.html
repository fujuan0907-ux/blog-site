<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>找回密码 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">📝 My Blog</div>
    <h2 class="auth-title">找回密码</h2>
    <p class="auth-subtitle">输入你的注册邮箱，我们将发送重置链接</p>

    <div id="alert-error" class="alert alert-error"></div>
    <div id="alert-success" class="alert alert-success"></div>

    <form id="reset-form">
      <div class="form-group">
        <label class="form-label" for="email">注册邮箱</label>
        <input class="form-input" type="email" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="btn-submit">
        <span id="btn-text">发送重置链接</span>
        <span class="spinner hidden" id="btn-spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <span>想起密码了？<a href="login.html">返回登录</a></span>
    </div>

    <p class="text-center mt-2">
      <a href="index.html" style="color: var(--gray-400); font-size: 0.85rem;">← 返回首页</a>
    </p>
  </div>

  <script src="js/app.js"></script>
  <script>
    const form = document.getElementById('reset-form');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();

      document.getElementById('btn-text').classList.add('hidden');
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('btn-submit').disabled = true;

      const { error } = await resetPassword(email);

      if (error) {
        showAlert('alert-error', error.message || '发送失败，请重试');
      } else {
        showAlert('alert-success', '重置密码邮件已发送！请查看邮箱（可能在垃圾箱中）');
      }

      document.getElementById('btn-text').classList.remove('hidden');
      document.getElementById('btn-spinner').classList.add('hidden');
      document.getElementById('btn-submit').disabled = false;
    });
  </script>
</body>
</html>
