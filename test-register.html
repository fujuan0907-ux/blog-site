<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册测试</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
    input, button { display: block; width: 100%; padding: 10px; margin: 8px 0; font-size: 16px; box-sizing: border-box; }
    button { background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { opacity: 0.5; }
    #result { margin-top: 12px; padding: 12px; border-radius: 6px; }
    .success { background: #d1fae5; color: #065f46; }
    .error { background: #fee2e2; color: #991b1b; }
  </style>
</head>
<body>
  <h2>🔧 注册测试</h2>
  <input type="text" id="username" placeholder="用户名" value="testuser">
  <input type="email" id="email" placeholder="邮箱" value="test@example.com">
  <input type="password" id="password" placeholder="密码" value="123456">
  <button id="btn" onclick="doRegister()">注册</button>
  <div id="result"></div>

  <script>
    const SUPABASE_URL = 'https://kieznunxgzsaxxokvspx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpZXpudW54Z3pzYXh4b2t2c3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjI2NDIsImV4cCI6MjA5NTc5ODY0Mn0.9peQ-Xc6FgNYTrz9IxM9322uWfG_6tCsxd-AyP4JSkU';

    async function doRegister() {
      const btn = document.getElementById('btn');
      const result = document.getElementById('result');
      btn.disabled = true;
      btn.textContent = '发送中...';
      result.textContent = '';

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const username = document.getElementById('username').value;

      try {
        const res = await fetch(SUPABASE_URL + '/auth/v1/signup', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password, data: { username } })
        });

        const data = await res.json();

        if (res.ok) {
          result.innerHTML = '<div class="success">✅ 注册成功！<br>用户ID: ' + data.user?.id + '<br>邮箱: ' + data.user?.email + '</div>';
        } else {
          result.innerHTML = '<div class="error">❌ 注册失败<br>状态: ' + res.status + '<br>信息: ' + (data.msg || data.message || JSON.stringify(data)) + '</div>';
        }
      } catch(e) {
        result.innerHTML = '<div class="error">❌ 网络错误: ' + e.message + '</div>';
      }

      btn.disabled = false;
      btn.textContent = '注册';
    }
  </script>
</body>
</html>
