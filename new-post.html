<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>写文章 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .editor-toolbar {
      display: flex; flex-wrap: wrap; gap: 2px;
      padding: 6px 8px; background: var(--gray-50);
      border: 1.5px solid var(--gray-300); border-bottom: none;
      border-radius: var(--radius) var(--radius) 0 0;
    }
    .editor-toolbar button, .editor-toolbar select {
      height: 30px; padding: 0 8px; font-size: 0.8rem;
      border: 1px solid transparent; border-radius: 4px;
      background: transparent; cursor: pointer; color: var(--gray-700);
      white-space: nowrap; display: inline-flex; align-items: center;
    }
    .editor-toolbar button:hover { background: var(--gray-200); border-color: var(--gray-300); }
    .editor-toolbar button.on { background: var(--primary-light); color: var(--primary); border-color: var(--primary); }
    .editor-toolbar .sep { width: 1px; background: var(--gray-300); margin: 0 4px; align-self: stretch; }
    .editor-toolbar select { max-width: 90px; appearance: auto; }
    .editor-toolbar input[type="color"] { width: 26px; height: 26px; padding: 1px; border: 1px solid var(--gray-300); border-radius: 4px; cursor: pointer; background: white; }
    #editor {
      min-height: 350px; padding: 14px 16px; font-size: 1rem; line-height: 1.8;
      border: 1.5px solid var(--gray-300); border-top: none; outline: none;
      color: var(--gray-800); background: white; overflow-y: auto;
    }
    #editor:focus { box-shadow: inset 0 0 0 2px var(--primary-light); }
    #editor h1 { font-size: 1.8rem; margin: 0.6rem 0 0.3rem; }
    #editor h2 { font-size: 1.5rem; margin: 0.5rem 0 0.25rem; }
    #editor h3 { font-size: 1.2rem; margin: 0.4rem 0 0.2rem; }
    #editor blockquote { border-left: 3px solid var(--primary); padding: 0.4rem 0.8rem; margin: 0.5rem 0; background: var(--gray-50); color: var(--gray-600); }
    #editor pre { background: var(--gray-800); color: #e5e7eb; padding: 0.8rem 1rem; border-radius: 6px; font-family: 'Menlo', 'Courier New', monospace; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; }
    #editor ul, #editor ol { padding-left: 1.5rem; margin: 0.4rem 0; }
    #editor hr { border: none; border-top: 1px solid var(--gray-200); margin: 1rem 0; }
    #editor p { margin: 0.4rem 0; }
    .editor-status {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 10px; font-size: 0.75rem; color: var(--gray-400);
      background: var(--gray-50); border: 1.5px solid var(--gray-300); border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="navbar-brand">📝 My Blog</a>
    <ul class="navbar-nav" id="nav-auth"></ul>
  </nav>

  <main class="container">
    <div class="card" style="padding:0; overflow:visible;">
      <div class="card-header" style="padding:1.25rem 1.5rem 1rem;">
        <h1 class="card-title" id="page-title">✏️ 发布新文章</h1>
      </div>

      <div style="padding:0 1.5rem;">
        <div id="alert-error" class="alert alert-error" style="display:none;"></div>
        <div id="alert-success" class="alert alert-success" style="display:none;"></div>

        <div class="form-group">
          <label class="form-label" for="post-title">文章标题</label>
          <input class="form-input" type="text" id="post-title" placeholder="输入文章标题..." required maxlength="255">
        </div>

        <!-- 工具栏 -->
        <div class="editor-toolbar" id="toolbar">
          <button type="button" title="撤销" data-cmd="undo">↩</button>
          <button type="button" title="重做" data-cmd="redo">↪</button>
          <span class="sep"></span>

          <select data-cmd="formatBlock" title="段落格式">
            <option value="p">正文</option>
            <option value="h1">标题 H1</option>
            <option value="h2">标题 H2</option>
            <option value="h3">标题 H3</option>
            <option value="blockquote">引用块</option>
            <option value="pre">代码块</option>
          </select>
          <span class="sep"></span>

          <select data-cmd="fontName" title="字体" style="font-family:inherit;">
            <option value="">字体（先选字号再打字；或选中文字后改字体）</option>
            <option value="Noto Sans SC" style="font-family:'Noto Sans SC'">思源黑体 Noto Sans SC</option>
            <option value="Noto Serif SC" style="font-family:'Noto Serif SC'">思源宋体 Noto Serif SC</option>
            <option value="ZCOOL XiaoWei" style="font-family:'ZCOOL XiaoWei'">站酷小薇 ZCOOL XiaoWei</option>
            <option value="Ma Shan Zheng" style="font-family:'Ma Shan Zheng'">马山正 Ma Shan Zheng</option>
            <option value="Roboto" style="font-family:'Roboto'">Roboto</option>
            <option value="Merriweather" style="font-family:'Merriweather'">Merriweather</option>
            <option value="Fira Code" style="font-family:'Fira Code'">Fira Code 等宽</option>
          </select>

          <select data-cmd="fontSize" title="字号">
            <option value="">字号</option>
            <option value="1">小</option>
            <option value="3">正常</option>
            <option value="5">大</option>
            <option value="7">特大</option>
          </select>
          <span class="sep"></span>

          <button type="button" title="粗体 (Ctrl+B)" data-cmd="bold"><b>B</b></button>
          <button type="button" title="斜体 (Ctrl+I)" data-cmd="italic"><i>I</i></button>
          <button type="button" title="下划线 (Ctrl+U)" data-cmd="underline"><u>U</u></button>
          <button type="button" title="删除线" data-cmd="strikethrough"><s>S</s></button>
          <span class="sep"></span>

          <input type="color" id="forecolor" title="字体颜色" value="#111827">
          <span class="sep"></span>

          <button type="button" title="左对齐" data-cmd="justifyLeft">⫷</button>
          <button type="button" title="居中" data-cmd="justifyCenter">≣</button>
          <button type="button" title="右对齐" data-cmd="justifyRight">⫸</button>
          <span class="sep"></span>

          <button type="button" title="无序列表" data-cmd="insertUnorderedList">• 列表</button>
          <button type="button" title="有序列表" data-cmd="insertOrderedList">1. 编号</button>
          <span class="sep"></span>

          <button type="button" title="分隔线" data-cmd="insertHorizontalRule">—</button>
          <button type="button" title="插入链接" data-cmd="createLink">🔗</button>
          <span class="sep"></span>

          <button type="button" title="清除格式" data-cmd="removeFormat" style="margin-left:auto;">✕ 清除格式</button>
        </div>

        <!-- 所见即所得编辑区 -->
        <div id="editor" contenteditable="true"><p><br></p></div>
        <div class="editor-status">
          <span id="word-count">0 字</span>
          <span>所见即所得编辑器</span>
        </div>
      </div>

      <!-- 图片上传 -->
      <div style="padding:0 1.5rem;">
        <div class="form-group" style="margin-top:1rem;">
          <label class="form-label">📷 上传图片</label>
          <div class="media-upload-area" id="image-drop">
            <div class="icon">🖼️</div>
            <p>点击或拖拽上传（JPG/PNG/GIF/WebP/HEIC，最大 5MB）</p>
          </div>
          <input type="file" id="image-input" accept="image/*" multiple style="display:none;">
          <div class="media-preview" id="image-previews"></div>
        </div>

        <!-- 视频链接 -->
        <div class="form-group">
          <label class="form-label">🎬 添加视频</label>
          <p class="form-hint">支持 YouTube / Bilibili 链接</p>
          <div id="video-list"></div>
          <button type="button" class="btn btn-outline btn-sm mt-1" id="btn-add-video">+ 添加视频链接</button>
        </div>
      </div>

      <div style="padding:1rem 1.5rem 1.5rem; display:flex; gap:0.75rem;">
        <button type="button" class="btn btn-primary" id="btn-submit">
          <span id="btn-text">发布文章</span>
          <span class="spinner hidden" id="btn-spinner"></span>
        </button>
        <a href="index.html" class="btn btn-outline">取消</a>
      </div>
    </div>
  </main>

  <script>
    var SUPABASE_URL = 'https://kieznunxgzsaxxokvspx.supabase.co';
    var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpZXpudW54Z3pzYXh4b2t2c3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjI2NDIsImV4cCI6MjA5NTc5ODY0Mn0.9peQ-Xc6FgNYTrz9IxM9322uWfG_6tCsxd-AyP4JSkU';

    function getSession() { try { return JSON.parse(localStorage.getItem('sb-token')); } catch(e) { return null; } }
    function getToken() { var s = getSession(); return s?.access_token || null; }
    function getUser() { var s = getSession(); return s?.user || null; }
    function esc(t) { if (!t) return ''; var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function showMsg(id, msg) { var el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; setTimeout(function() { el.style.display = 'none'; }, 4000); }

    // ====== 权限 ======
    var user = getUser();
    if (!user) { window.location.href = 'login.html'; }
    (function() {
      var nav = document.getElementById('nav-auth');
      nav.innerHTML = '<a href="profile.html" style="font-weight:600;color:var(--primary);">👤 ' + esc(user.email) + '</a>' +
        '<a href="#" id="btn-logout" class="btn btn-outline btn-sm">退出</a>';
      document.getElementById('btn-logout').addEventListener('click', function(e) {
        e.preventDefault(); localStorage.removeItem('sb-token'); window.location.href = 'index.html';
      });
    })();

    // ====== 编辑模式 ======
    var editingId = new URLSearchParams(window.location.search).get('edit') || null;
    var editor = document.getElementById('editor');

    if (editingId) {
      document.getElementById('page-title').textContent = '✏️ 编辑文章';
      document.getElementById('btn-text').textContent = '保存修改';
      loadExistingPost(editingId);
    }

    async function loadExistingPost(id) {
      try {
        var res = await fetch(SUPABASE_URL + '/rest/v1/posts?id=eq.' + id + '&select=*', {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        });
        var posts = await res.json();
        var post = posts && posts[0];
        if (post) {
          document.getElementById('post-title').value = post.title || '';
          editor.innerHTML = post.content || '<p><br></p>';
          updateWordCount();
          if (post.media_urls) {
            post.media_urls.forEach(function(m) {
              if (m.type === 'image') {
                uploadedImages.push({ file: null, previewUrl: m.url, uploadedUrl: m.url, caption: m.caption || '' });
              } else if (m.type === 'video') {
                videoEntries.push({ url: m.url, caption: m.caption || '' });
              }
            });
            renderImagePreviews();
            renderVideoInputs();
          }
        }
      } catch(e) { showMsg('alert-error', '加载文章失败'); }
    }

    // ====== 工具栏 ======
    // 启用 CSS 模式（让 execCommand 生成 <span style="..."> 而不是废弃的 <font> 标签）
    document.execCommand('styleWithCSS', false, true);

    // 选区保存/恢复（下拉框和取色器打开时会丢失选区/焦点）
    var savedRange = null;
    function saveRange() {
      var s = window.getSelection();
      if (s.rangeCount > 0 && !s.isCollapsed) savedRange = s.getRangeAt(0).cloneRange();
      else savedRange = null;
    }
    function restoreFocus() {
      editor.focus();
      if (savedRange) {
        var s = window.getSelection(); s.removeAllRanges(); s.addRange(savedRange);
        savedRange = null;
      }
    }
    document.querySelectorAll('#toolbar select, #toolbar input[type="color"]').forEach(function(el) {
      el.addEventListener('mousedown', saveRange);
    });

    // 按钮命令
    document.getElementById('toolbar').addEventListener('click', function(e) {
      var btn = e.target.closest('button');
      if (!btn) return;
      var cmd = btn.dataset.cmd;
      if (!cmd) return;
      e.preventDefault();
      editor.focus();

      if (cmd === 'createLink') {
        var url = prompt('输入链接地址（https://...）：', 'https://');
        if (url) document.execCommand(cmd, false, url);
        updateWordCount(); return;
      }
      if (cmd === 'formatBlock' || cmd === 'fontName' || cmd === 'fontSize') return;
      document.execCommand(cmd, false, null);
      updateWordCount();
    });

    // 段落/字体/字号 select — 统一用 execCommand
    document.getElementById('toolbar').addEventListener('change', function(e) {
      var selEl = e.target;
      if (selEl.tagName !== 'SELECT') return;
      var cmd = selEl.dataset.cmd;
      var val = selEl.value;
      if (!val) return;

      restoreFocus();
      // execCommand 对选中文字生效；没选中时设置"待用样式"，后续打字自动应用
      document.execCommand(cmd, false, val);
      selEl.value = '';
      updateWordCount();
    });

    // 字体颜色
    var foreColorInput = document.getElementById('forecolor');
    foreColorInput.addEventListener('change', function() {
      restoreFocus();
      document.execCommand('foreColor', false, this.value);
      updateWordCount();
    });

    // 字数统计
    function updateWordCount() {
      var text = (editor.textContent || '').replace(/\s+/g, '');
      document.getElementById('word-count').textContent = text.length + ' 字';
    }
    editor.addEventListener('input', updateWordCount);

    // 初始字数
    setTimeout(updateWordCount, 100);

    // ====== 图片处理 ======
    var uploadedImages = [];
    var ALLOWED_EXT = ['jpg','jpeg','png','gif','webp','svg','heic','heif','bmp','tiff','tif'];

    document.getElementById('image-drop').addEventListener('click', function() { document.getElementById('image-input').click(); });
    var dropZone = document.getElementById('image-drop');
    dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.style.borderColor = 'var(--primary)'; });
    dropZone.addEventListener('dragleave', function(e) { dropZone.style.borderColor = ''; });
    dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.style.borderColor = ''; addImages(e.dataTransfer.files); });
    document.getElementById('image-input').addEventListener('change', function(e) { addImages(e.target.files); e.target.value = ''; });

    function addImages(files) {
      if (!files || !files.length) return;
      var added = 0;
      Array.from(files).forEach(function(file) {
        var ext = (file.name.split('.').pop() || '').toLowerCase();
        if (!file.type.startsWith('image/') && ALLOWED_EXT.indexOf(ext) === -1) {
          showMsg('alert-error', '❌ "' + file.name + '" 不是图片'); return;
        }
        if (file.size > 5*1024*1024) {
          showMsg('alert-error', '❌ "' + file.name + '" 超过 5MB'); return;
        }
        uploadedImages.push({ file: file, previewUrl: URL.createObjectURL(file), uploadedUrl: null, caption: '' });
        added++;
      });
      if (added > 0) showMsg('alert-success', '✅ 已选择 ' + added + ' 张图片');
      renderImagePreviews();
    }

    function renderImagePreviews() {
      var container = document.getElementById('image-previews');
      if (!uploadedImages.length) { container.innerHTML = ''; return; }
      var html = '';
      uploadedImages.forEach(function(img, i) {
        var src = img.previewUrl || img.uploadedUrl || '';
        html += '<div class="media-preview-item" style="display:inline-block;vertical-align:top;margin:4px;">' +
          '<img src="' + esc(src) + '" alt="" style="width:120px;height:120px;object-fit:cover;">' +
          '<button class="media-preview-remove" data-idx="' + i + '" type="button">✕</button></div>' +
          '<input class="form-input" placeholder="说明（可选）" style="width:120px;font-size:0.75rem;padding:0.25rem;display:inline-block;vertical-align:top;margin:4px;" value="' + esc(img.caption) + '" data-idx="' + i + '">';
      });
      container.innerHTML = html;
      container.querySelectorAll('.media-preview-remove').forEach(function(b) {
        b.addEventListener('click', function() { removeImg(parseInt(this.dataset.idx)); });
      });
      container.querySelectorAll('input[data-idx]').forEach(function(b) {
        b.addEventListener('input', function() {
          var i = parseInt(this.dataset.idx);
          if (uploadedImages[i]) uploadedImages[i].caption = this.value;
        });
      });
    }

    function removeImg(idx) {
      var img = uploadedImages[idx];
      if (img && img.previewUrl && img.previewUrl.startsWith('blob:')) URL.revokeObjectURL(img.previewUrl);
      uploadedImages.splice(idx, 1);
      renderImagePreviews();
    }

    // ====== 视频 ======
    var videoEntries = [];
    document.getElementById('btn-add-video').addEventListener('click', function() {
      videoEntries.push({ url: '', caption: '' }); renderVideoInputs();
    });

    function renderVideoInputs() {
      var html = '';
      videoEntries.forEach(function(v, i) {
        html += '<div class="video-url-row">' +
          '<input class="form-input" placeholder="视频 URL" value="' + esc(v.url) + '">' +
          '<input class="form-input" placeholder="说明" style="max-width:160px;" value="' + esc(v.caption) + '">' +
          '<button type="button" class="btn btn-outline btn-sm">✕</button></div>';
      });
      document.getElementById('video-list').innerHTML = html;
      document.querySelectorAll('#video-list .video-url-row').forEach(function(row, i) {
        row.querySelectorAll('input')[0].addEventListener('input', function() { videoEntries[i].url = this.value; });
        row.querySelectorAll('input')[1].addEventListener('input', function() { videoEntries[i].caption = this.value; });
        row.querySelector('button').addEventListener('click', function() { videoEntries.splice(i, 1); renderVideoInputs(); });
      });
    }

    // ====== 提交 ======
    document.getElementById('btn-submit').addEventListener('click', async function(e) {
      e.preventDefault();

      var title = document.getElementById('post-title').value.trim();
      var content = editor.innerHTML.trim();
      if (content === '<p><br></p>') content = '';

      if (!title) { showMsg('alert-error', '请输入标题'); return; }
      if (!content) { showMsg('alert-error', '请输入内容'); return; }

      var btnText = document.getElementById('btn-text');
      var btnSpinner = document.getElementById('btn-spinner');
      var btnSubmit = document.getElementById('btn-submit');
      btnText.classList.add('hidden');
      btnSpinner.classList.remove('hidden');
      btnSubmit.disabled = true;

      function reenable() { btnText.classList.remove('hidden'); btnSpinner.classList.add('hidden'); btnSubmit.disabled = false; }

      try {
        var token = getToken();
        if (!token) { showMsg('alert-error', '登录已过期'); reenable(); return; }

        // 上传图片
        var imageUrls = [];
        for (var i = 0; i < uploadedImages.length; i++) {
          var img = uploadedImages[i];
          if (img.uploadedUrl) { imageUrls.push({ type: 'image', url: img.uploadedUrl, caption: img.caption }); continue; }
          if (!img.file) continue;
          if (img.file.size > 5*1024*1024) { showMsg('alert-error', '❌ 图片超过 5MB'); reenable(); return; }

          var ext = img.file.name.split('.').pop().toLowerCase();
          if (ALLOWED_EXT.indexOf(ext) === -1) { showMsg('alert-error', '❌ 格式不支持'); reenable(); return; }

          var fname = user.id + '/' + Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;
          var fd = new FormData();
          fd.append('', img.file);
          fd.append('cacheControl', '3600');

          var upRes = await fetch(SUPABASE_URL + '/storage/v1/object/post-media/' + fname, {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token },
            body: fd
          });
          if (!upRes.ok) {
            var errData = await upRes.json().catch(function() { return {}; });
            showMsg('alert-error', '❌ 上传失败: ' + (errData.message || '请重试'));
            reenable(); return;
          }
          var uploadedUrl = SUPABASE_URL + '/storage/v1/object/public/post-media/' + fname;
          imageUrls.push({ type: 'image', url: uploadedUrl, caption: img.caption });
          img.uploadedUrl = uploadedUrl;
        }

        var videoUrls = videoEntries.filter(function(v) { return v.url.trim(); }).map(function(v) {
          return { type: 'video', url: v.url.trim(), caption: v.caption };
        });

        var allMedia = imageUrls.concat(videoUrls);
        var body = { title: title, content: content, media_urls: allMedia, updated_at: new Date().toISOString() };

        var result;
        if (editingId) {
          var patchRes = await fetch(SUPABASE_URL + '/rest/v1/posts?id=eq.' + editingId, {
            method: 'PATCH',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
            body: JSON.stringify(body)
          });
          if (!patchRes.ok) { showMsg('alert-error', '❌ 更新失败'); reenable(); return; }
          var pd = await patchRes.json();
          result = pd && pd[0];
        } else {
          body.user_id = user.id;
          var postRes = await fetch(SUPABASE_URL + '/rest/v1/posts', {
            method: 'POST',
            headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
            body: JSON.stringify(body)
          });
          if (!postRes.ok) { showMsg('alert-error', '❌ 发布失败'); reenable(); return; }
          var d = await postRes.json();
          result = d && d[0];
        }

        if (result && result.id) {
          window.location.href = 'post.html?id=' + result.id;
        } else {
          showMsg('alert-error', '❌ 发布失败');
          reenable();
        }
      } catch(err) {
        showMsg('alert-error', '❌ ' + (err.message || '未知错误'));
        reenable();
      }
    });
  </script>
</body>
</html>
