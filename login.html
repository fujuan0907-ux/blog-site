<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - My Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <div class="auth-logo">📝 My Blog</div>
    <h2 class="auth-title">欢迎回来</h2>
    <p class="auth-subtitle">登录你的账号继续写作</p>

    <div id="alert-error" class="alert alert-error" style="display:none;"></div>
    <div id="alert-success" class="alert alert-success" style="display:none;"></div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">邮箱地址</label>
        <input class="form-input" type="email" id="email" placeholder="your@email.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input class="form-input" type="password" id="password" placeholder="输入密码" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="btn-submit">
        <span id="btn-text">登录</span>
        <span class="spinner hidden" id="btn-spinner"></span>
      </button>
    </form>

    <div class="auth-footer">
      <a href="reset-password.html">忘记密码？</a>
      <span style="margin: 0 0.5rem;">|</span>
      <span>还没有账号？<a href="register.html">立即注册</a></span>
    </div>

    <p class="text-center mt-2">
      <a href="index.html" style="color: var(--gray-400); font-size: 0.85rem;">← 返回首页</a>
    </p>
  </div>

  <script>
    const SUPABASE_URL = 'https://kieznunxgzsaxxokvspx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtpZXpudW54Z3pzYXh4b2t2c3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjI2NDIsImV4cCI6MjA5NTc5ODY0Mn0.9peQ-Xc6FgNYTrz9IxM9322uWfG_6tCsxd-AyP4JSkU';

    function showMsg(id, msg) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(function() { el.style.display = 'none'; }, 6000);
    }

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();

      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;

      document.getElementById('btn-text').classList.add('hidden');
      document.getElementById('btn-spinner').classList.remove('hidden');
      document.getElementById('btn-submit').disabled = true;

      try {
        var res = await fetch(SUPABASE_URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_KEY,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email: email, password: password })
        });

        var data = await res.json();

        document.getElementById('btn-text').classList.remove('hidden');
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('btn-submit').disabled = false;

        if (res.ok && data.access_token) {
          // 保存登录状态
          localStorage.setItem('sb-token', JSON.stringify({
            access_token: data.access_token,
            refresh_token: data.refresh_token,
            user: data.user,
            expires_at: Date.now() + (data.expires_in || 3600) * 1000
          }));
          showMsg('alert-success', '✅ 登录成功！正在跳转...');
          setTimeout(function() { window.location.href = 'index.html'; }, 800);
        } else {
          var errMsg = data.error_description || data.msg || '邮箱或密码错误';
          showMsg('alert-error', '❌ ' + errMsg);
        }
      } catch(err) {
        document.getElementById('btn-text').classList.remove('hidden');
        document.getElementById('btn-spinner').classList.add('hidden');
        document.getElementById('btn-submit').disabled = false;
        showMsg('alert-error', '❌ 网络错误: ' + err.message);
      }
    });
  </script>
</body>
</html>
